project:
  type: website
  output-dir: _site
  # All qmd chunks execute with the project root as the working directory, so
  # posts/*.qmd can source("R/...") and read DATA/ with root-relative paths.
  execute-dir: project
  # Regenerate the SCSS colour mirror from the shared token YAML before every
  # render, so R figures and HTML chrome always agree. Pure local, no network.
  pre-render:
    - theme/build-tokens.R
  # NOTE: wildfires-europe-2025-local.qmd stays frozen at repo root for now.
  render:
    - index.qmd
    - about.qmd
    - posts/2026.qmd

website:
  title: "BURNS: Europe Wildfire Season Tracker"
  favicon: assets/favicon.png
  open-graph:
    image: assets/og-image.png
    description: "Tracking Europe's wildfire season from EFFIS rapid perimeters, refreshed weekly during fire season."
  twitter-card:
    image: assets/og-image.png
    card-style: summary_large_image
  page-footer:
    left: "Pierre Beaucoral"
    right: "Built with Quarto"
  navbar:
    left:
      - text: "Tracker"
        href: index.qmd
      - text: "Seasons"
        menu:
          - text: "2026 (current)"
            href: posts/2026.qmd
          - text: "2025 (archive, coming)"
            href: index.qmd
      - text: "About"
        href: about.qmd

format:
  html:
    # burns.scss / burns-dark.scss layer the BURNS identity on top of the
    # minty/darkly bootswatch bases (surcouche); both import the shared
    # token mirror theme/_burns-tokens.scss.
    theme:
      light: [minty, theme/burns.scss]
      dark: [darkly, theme/burns-dark.scss]
    respect-user-color-scheme: true
    highlight-style: tango
    code-fold: true
    code-summary: "Show code"
    code-tools: true
    toc: true
    toc-depth: 3
    smooth-scroll: true
    lightbox: true
    link-external-newwindow: true
    df-print: paged

execute:
  freeze: auto
  echo: true
  warning: false
  message: false
