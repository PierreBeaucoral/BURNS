# BURNS design tokens - SINGLE SOURCE OF TRUTH.
# Consumed by R (R/tokens.R via yaml::read_yaml) and by SCSS
# (theme/_burns-tokens.scss, regenerated by theme/build-tokens.R at pre-render).
# No brand hex should live anywhere else: edit here.

fonts:
  sans: "IBM Plex Sans"
  mono: "IBM Plex Mono"

# Direction B (Atlas Positron), primary accent = the forest green from
# pierrebeaucoral.github.io (--forest2). Roles are documented, not decorative.
brand:
  forest:          "#2E6048"   # PRIMARY brand accent: navbar, hero, links, focus, TOC, headings
  forest_deep:     "#18241D"   # darkest forest (site --forest): deep accent / hover
  forest_bright:   "#5FB489"   # forest accent on dark backgrounds (keeps AA)
  ember:           "#D64A05"   # FIGURE data series only: current season / summer fire
  ember_bright:    "#F26722"   # ember on dark backgrounds
  ember_deep:      "#A63A08"   # ember hover / pressed
  winter_blue:     "#3E8EC4"   # Jan-May / winter series
  reburn_blue:     "#1F78B4"   # re-burn of an existing scar
  clay:            "#9C5234"   # warm secondary (site --clay)
  ocean:           "#2C5C70"   # cool secondary (site --ocean)
  veg_green:       "#2E7D32"   # vegetation (figure land-cover, secondary)

light:
  ink:     "#1B2126"
  muted:   "#5C6873"
  surface: "#FFFFFF"
  bg:      "#F6F7F9"
  border:  "#DCE1E6"

dark:
  ink:     "#E7ECF0"
  muted:   "#93A0AC"
  surface: "#1D2429"
  bg:      "#14181C"
  border:  "#2C353C"

# EFFIS land-cover palette (order == legend order). Shared by ggplot pal_lc
# and any HTML legend that must match a figure. Colour-blind-safe.
land_cover:
  "Broad-leaved forest":         "#2E7D32"
  "Coniferous forest":           "#00512D"
  "Mixed forest":                "#4CAF50"
  "Sclerophyllous veg.":         "#E64A19"
  "Transitional woodland-shrub": "#8C6D31"
  "Agricultural areas":          "#DDAA33"
  "Artificial surfaces":         "#6E6E6E"
  "Other natural LC":            "#3E8EC4"
  "Other LC":                    "#9B59B6"
